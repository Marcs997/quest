<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="robots" content="noindex, nofollow" />
  <title>QUEST · Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-stars" aria-hidden="true"></div>
  <div class="scanlines" aria-hidden="true"></div>
  <div class="vignette" aria-hidden="true"></div>

  <main class="admin">
    <h1 class="admin__head">ADMIN<small>PANNEAU DE CONTRÔLE</small></h1>

    <!-- password gate -->
    <section class="card" id="gateCard">
      <h2 class="card__title">ACCÈS PROTÉGÉ</h2>
      <form class="gate" id="gateForm" autocomplete="off">
        <input class="field" id="pwd" type="password" inputmode="numeric"
               maxlength="8" placeholder="••••" aria-label="Mot de passe" />
        <button type="submit" class="pbtn">ENTRER</button>
        <p class="gate__error" id="gateError"></p>
      </form>
    </section>

    <!-- controls (hidden until unlocked) -->
    <div id="panel" class="hidden">
      <section class="card">
        <h2 class="card__title">NIVEAU DE LA PAGE PRINCIPALE</h2>
        <div class="lvl-ctrl">
          <button type="button" class="pbtn pbtn--danger lvl-step" id="lvlDown" aria-label="Diminuer">−</button>
          <span class="lvl-ctrl__value"><span id="lvlValue">5</span><small> / 99</small></span>
          <button type="button" class="pbtn lvl-step" id="lvlUp" aria-label="Augmenter">+</button>
        </div>
        <input class="lvl-slider" id="lvlSlider" type="range" min="0" max="99" value="5" aria-label="Niveau" />
      </section>

      <section class="card">
        <h2 class="card__title">ITEMS À GAGNER</h2>
        <div id="itemList"></div>
      </section>

      <p class="admin__back"><a href="index.html">← Retour au jeu</a></p>
    </div>
  </main>

  <script src="state.js"></script>
  <script src="admin.js"></script>
</body>
</html>
