<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>QUEST</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- atmosphere layers -->
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-stars" aria-hidden="true"></div>
  <div class="scanlines" aria-hidden="true"></div>
  <div class="vignette" aria-hidden="true"></div>

  <div class="layout">

    <!-- reward items rail (filled in by main.js) -->
    <aside class="items" aria-label="Items à gagner">
      <span class="items__title">BUTIN</span>
      <div class="items__rail" id="itemsRail"></div>
    </aside>

    <main class="screen">

      <!-- logo -->
      <header class="logo">
        <img src="Ressources/Logo.png" alt="QUEST" />
      </header>

      <!-- game-mode menu -->
      <div class="modebar">
        <div class="dropdown" id="modeDropdown">
          <button type="button" class="btn-mode" id="modeBtn" aria-haspopup="true" aria-expanded="false">
            <span>MODE DE JEU</span><span class="btn-mode__caret">▾</span>
          </button>
          <ul class="dropdown__menu" id="modeMenu" role="menu" hidden>
            <li><button class="dropdown__item is-disabled" disabled role="menuitem">Mode histoire <em>bientôt</em></button></li>
            <li><button class="dropdown__item is-disabled" disabled role="menuitem">Jeu de rôle <em>bientôt</em></button></li>
            <li><button class="dropdown__item" data-mode="td" role="menuitem">Action ou vérité</button></li>
            <li><button class="dropdown__item" data-mode="morpion" role="menuitem">Le morpion</button></li>
          </ul>
        </div>
      </div>

      <!-- progress bar -->
      <section class="progress" aria-label="Progression du jeu">
        <div class="progress__head">
          <span class="progress__title">PROGRESSION</span>
          <span class="progress__level">LV <em id="levelValue">05</em></span>
        </div>
        <div class="xpbar" role="progressbar" aria-valuemin="0" aria-valuemax="99" aria-valuenow="5">
          <span class="xpbar__cap">00</span>
          <div class="xpbar__track">
            <div class="xpbar__fill" id="xpFill">
              <span class="xpbar__shine"></span>
            </div>
            <div class="xpbar__ticks" aria-hidden="true"></div>
          </div>
          <span class="xpbar__cap">99</span>
        </div>
      </section>

      <!-- players -->
      <section class="players" aria-label="Joueurs">
        <figure class="player player--1">
          <div class="player__stage">
            <img class="player__skin" src="Ressources/Perso1.png" alt="Joueur 1" />
            <span class="player__shadow"></span>
          </div>
          <figcaption class="player__name">JOUEUR 1</figcaption>
        </figure>

        <span class="players__vs" aria-hidden="true">VS</span>

        <figure class="player player--2">
          <div class="player__stage">
            <img class="player__skin" src="Ressources/Perso2.png" alt="Joueur 2" />
            <span class="player__shadow"></span>
          </div>
          <figcaption class="player__name">JOUEUR 2</figcaption>
        </figure>
      </section>

      <!-- level up -->
      <div class="levelup">
        <button type="button" class="btn-levelup" id="levelUpBtn">
          <span class="btn-levelup__label">LEVEL UP</span>
        </button>
      </div>

      <!-- world map -->
      <section class="world" aria-label="La map du jeu">
        <div class="world__frame">
          <canvas id="worldMap" width="616" height="308" role="img" aria-label="Map du monde de Quest"></canvas>
        </div>
        <span class="world__caption">— MAP —</span>
      </section>

    </main>

    <!-- player select for Action ou Vérité -->
    <div class="modal" id="tdModal" hidden>
      <div class="modal__box">
        <button class="modal__close" id="tdModalClose" aria-label="Fermer">✕</button>
        <h2 class="modal__title">ACTION OU VÉRITÉ</h2>
        <p class="modal__text">Tu es quel joueur ?</p>
        <div class="modal__choices">
          <button class="pick pick--1" data-player="1">
            <img src="Ressources/Perso1.png" alt="" /><span>JOUEUR 1</span>
          </button>
          <button class="pick pick--2" data-player="2">
            <img src="Ressources/Perso2.png" alt="" /><span>JOUEUR 2</span>
          </button>
        </div>
        <p class="modal__hint" id="tdModalHint"></p>
      </div>
    </div>
  </div>

  <script type="module" src="td-sync.js"></script>
  <script type="module" src="morpion-sync.js"></script>
  <script src="state.js"></script>
  <script src="main.js"></script>
  <script src="map.js"></script>
</body>
</html>
