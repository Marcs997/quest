<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>QUEST · Action ou Vérité</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-stars" aria-hidden="true"></div>
  <div class="scanlines" aria-hidden="true"></div>
  <div class="vignette" aria-hidden="true"></div>

  <main class="td-page">
    <header class="td-head">
      <a class="td-back" href="index.html">← QUEST</a>
      <h1 class="td-title">ACTION OU VÉRITÉ</h1>
      <span class="td-me" id="tdMe"></span>
    </header>

    <section class="td-lobby" id="tdLobby">
      <div class="td-spinner" aria-hidden="true"></div>
      <p class="td-status" id="tdStatus">Connexion…</p>
    </section>

    <section class="td-game" id="tdGame" hidden>
      <div class="td-role" id="tdRole"></div>
      <div class="td-action" id="tdAction"></div>
      <div class="td-journal">
        <h2 class="td-journal__title">JOURNAL</h2>
        <div class="td-log" id="tdLog"></div>
      </div>
      <button class="pbtn pbtn--danger td-quit" id="tdQuit">QUITTER LE JEU</button>
    </section>
  </main>

  <script src="state.js"></script>
  <script src="td.js"></script>
</body>
</html>
